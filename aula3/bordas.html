<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Border</title>
        <style>
            div {
                font-size: 25px;
                padding: 20px;
                width: 50%;
                height: 40px;
                border: solid 4px black;
                border-radius: 20px;
                box-shadow: 10px 20px grey;
                margin: 12%;
                color: darkgreen;
            }
        </style>
    </head>
    <body>
        <div>Some Element</div>
    </body>
</html>
