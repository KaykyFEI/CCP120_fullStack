<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Border</title>
        <style>
            #div1 {
                font-size: 25px;
                padding: 20px;
                width: 50%;
                height: 40px;
                border: solid 4px black;
                border-radius: 20px;
                box-shadow: 10px 20px grey;
                margin: 12%;
                color: darkgreen;
            }  

            div {
                background-color: antiquewhite;
                margin: 10px;
                display: inline;
            }

            a {
                background-color: antiquewhite;
                margin: 10px;
                display: block;
            }

            p {
                background: rgb(202, 202, 202);
                width: 500px;
                height: 150px;
                padding: 20px;
                border: 5px solid gray;
                margin: 20px;
            }
        </style>
    </head>
    <body>
        <a href="https://portal.fei.edu.br/">FEI</a>
        <a href="https://moodle.fei.edu.br/">MOODLE</a>

        <div>DIV 3</div>
    </body>
</html>
