<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Posicionamento</title>
        <style>
            div {
                font-size: 15px;
                padding: 20px;
                width: 100px;
                height: 20px;
                border: solid 2px black;
                color: black;
            }

            .absolute {
                position: absolute;
                top: 40px;
                left: 40px;
                background-color: tomato;
                color: #fff;
            }
        </style>
    </head>

    <body>
        <div>Some Element</div>
        <div class="absolute">Absolute</div>
    </body>
</html>
