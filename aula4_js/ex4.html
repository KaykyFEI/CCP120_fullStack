<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>JavaScript</title>
    </head>
    <body>
        <script>
            let numero = parseInt(prompt("Insira um número inteiro: "))
            for (let i = numero; i > 0; i--){
                fatorial = numero * i
            }
            console.log(fatorial)
        </script>
    </body>
</html>
