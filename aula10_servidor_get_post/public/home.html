<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Servidor - Get, Post, Template </title>
<link href="estilo.css" rel="stylesheet">
</head>

<body>
    <h1>Servidor</h1>
    <h2>Formulário (método: get, action: inicio)</h2>
    <form action="/inicio" method="get">
        <p>Data: <input type="date" name="data"></p>
        <input type="submit" value="Clique aqui!">
    </form>

    <h2>Cadastrar usuário</h2>
    <form>
        <p>Nome: <input type="text" name="nome"></p>
        <p>Sobrenome:  <input type="text" name="sobrenome"></p>
        <p>Nascimento: <input type="date" name="nascimento"></p>
        <p>Estado Civil: <input type="text" name="civil"></p>
        <input type="submit" value="Salvar">
    </form>
</body> 
</html>
